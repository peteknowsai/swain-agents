name: Deploy Swain Agent API

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'bridge/**'
      - 'skills/**'
      - 'templates/**'
      - 'sprite/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Deploy API + Bridge
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            export PATH=/root/.bun/bin:$PATH
            cd /root/clawd/swain-agents && git pull

            # Restart API
            systemctl restart swain-agent-api
            sleep 2
            systemctl is-active swain-agent-api

            # Restart Bridge
            systemctl restart swain-bridge
            sleep 2
            systemctl is-active swain-bridge

      - name: Check if sprite tools changed
        id: sprite-changes
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -qE '^sprite/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update tools on all sprites
        if: steps.sprite-changes.outputs.changed == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          timeout: 600s
          script: |
            export PATH=/root/.local/bin:/root/.bun/bin:$PATH
            export HOME=/root
            cd /root/clawd/swain-agents && git pull
            bash sprite/scripts/update-clis.sh

name: Deploy Swain Agent API

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'bridge/**'
      - 'skills/**'
      - 'templates/**'
      - 'sprite/**'
  schedule:
    - cron: '0 6 * * *'  # Daily at 6am UTC — update Claude Code on all sprites

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy API + Bridge
        if: github.event_name == 'push'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            export PATH=/root/.bun/bin:$PATH
            cd /root/clawd/swain-agents && git pull

            # Restart API
            systemctl restart swain-agent-api
            sleep 2
            systemctl is-active swain-agent-api

            # Restart Bridge
            systemctl restart swain-bridge
            sleep 2
            systemctl is-active swain-bridge

      - name: Update all tools on all sprites
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          timeout: 600s
          script: |
            export PATH=/root/.local/bin:/root/.bun/bin:$PATH
            export HOME=/root
            cd /root/clawd/swain-agents && git pull
            bash sprite/scripts/update-claude.sh
            bash sprite/scripts/update-clis.sh

name: Deploy Skip Agent API

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'templates/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: 76.13.106.143
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /root/skip-agent-api
            rm -rf api/ templates/

      - name: Copy files
        uses: appleboy/scp-action@v0
        with:
          host: 76.13.106.143
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "api/,templates/"
          target: /root/skip-agent-api/

      - name: Restart service
        uses: appleboy/ssh-action@v1
        with:
          host: 76.13.106.143
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            systemctl restart skip-agent-api
            sleep 2
            systemctl is-active skip-agent-api
